<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="manifest" href="manifest.json">

<body>

<!-- 背景 -->

<!-- アプリ -->

<div id="app">

<!-- ヘッダー -->

<header>

<div class="left">

<div class="avatar">
🐱
</div>

<div>

<h1>よしくんGPT NEO</h1>

<p id="status">
● よしくんとオンライン
</p>

</div>

</div>

<div class="right">

<button id="darkBtn">

🌙

</button>

<button id="menuBtn">

☰

</button>

</div>

</header>

<!-- メニュー -->

<nav id="menu">

<button id="clearHistory">

🗑 証拠隠滅

</button>

<button id="exportHistory">

💾 履歴保存

</button>

<button id="importHistory">

📂 履歴読込

</button>

<button id="speechBtn">

🔊 読み上げ

</button>

<button id="voiceBtn">

🎤 音声入力

</button>

<!-- チャット -->

<main id="chat">

</main>

<!-- 入力中 -->

<div id="typing">

<span></span>

<span></span>

<span></span>

</div>

<div id="quickArea">

<button>こんにちは</button>

<button>ゲーム</button>

<button>ラーメン</button>

<button>学校</button>

<button>AI</button>

<button>猫</button>

<button>面白い話</button>

<button>占い</button>

</div>

<!-- 入力欄 -->

<footer>

<input

id="input"

type="text"

placeholder="メッセージを入力"

autocomplete="off"

>

<button id="send">

送信

</button>

</footer>

</div>

<!-- テンプレート -->

<template id="userTemplate">

<div class="message user">

<div class="icon">

😊

</div>

<div class="bubble">

<span class="text"></span>

</div>

</div>

</template>

<template id="botTemplate">

<div class="message bot">

<div class="icon">

🐱

</div>

<div class="bubble">

<span class="text"></span>

</div>

</div>

</template>

<script src="knowledge.js"></script>

<script src="effects.js"></script>
